  <script>
   var str = ' ';

{"chs":"人类的生命因其短暂，才弥足珍贵","eng":"Human life is ephemera, which makes it precious.","author":"Root - Person of Interest"},

{"chs":"我原想收获一缕春风，你却给了我整个春天","eng":"","author":"汪国真 - 感谢"},
{"chs":"我会与她白头到老，只是天各一方","eng":"I'll grow old with her. Just from afar.","author":"Finch - Person of Interest"}
];
   var originalArray=new Array;//原数组 
	//给原数组originalArray赋值 
   for (var i=0;i<json_sen.length;i++){ 
      originalArray[i]=i; 
   } 
   originalArray.sort(function(){ return 0.5 - Math.random(); }); 
   var arrend = originalArray[originalArray.length - 1];
   
   var j = originalArray[0];
   var index = 0;
   
   function my_random(){
    
    index++;
	if (index >= json_sen.length)
	{
	   while(originalArray[0] == arrend)
	   {
	   originalArray.sort(function(){ return 0.5 - Math.random(); }); 
	   }
	   index = 0;
	}
	j = originalArray[index];
}
	
   function my_typing(argu1,argu2){
    clickable = false;
	str = argu1;
	divTyping = document.getElementById(argu2);
	divTyping.innerHTML = str;
   }
   
   function my_print(){
	$('#a').hide();
	$('#b').hide();
	$('#c').hide();
    my_typing(json_sen[j].eng,'a');
	my_typing(json_sen[j].chs,'b');
	my_typing(json_sen[j].author,'c');
	//$('#a').show();
	//$('#b').show();
	//$('#c').show();
	$('#a').fadeIn(800);
	$('#b').fadeIn(800);
	$('#c').fadeIn(800);
   }
   
   function change(){
		my_random();
		document.getElementById('a').innerHTML = "";
		document.getElementById('b').innerHTML = "";
		document.getElementById('c').innerHTML = "";
		my_print();
   }
   </script>
